    <style>

        .btn-exam { background-color: #e74c3c; color: white; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        .btn-exam:hover { background-color: #c0392b; transform: translateY(-3px); }
        .btn-study { background-color: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        .btn-study:hover { background-color: #2980b9; transform: translateY(-3px); }

        #quiz-container { display: none; height: 100vh; width: 100vw; }
        #main-content { flex: 1; background-color: #34495e; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; position: relative; overflow: hidden; }

        .close-btn:hover { background: #c0392b; }
        .hidden { display: none !important; }
    </style>

<body>
    <div id="start-container">
        <h1>Bell Exam 3차 - Head and Neck</h1>
        <div id="seed-input-box">
            <label for="seed-input" style="color:#bdc3c7; font-size:16px;">시드 번호 (비워두면 랜덤)</label><br>
            <input type="number" id="seed-input" placeholder="예: 1234" autocomplete="off">

            <button class="mode-btn btn-study" onclick="startQuiz('study')">공부 모드<span>무제한 시간 / 자유로운 이동</span></button>
            
            <div style="margin-top: 30px; text-align: center; width: 400px;">
                <button class="record-btn" onclick="toggleRecords()">내 기록 보기</button>

            </div>

    <div id="quiz-container">

            <div class="input-box">

    <div id="result-container">
        <h1>Quiz Results</h1>
        <div class="score-display" id="total-score">점수: 0 / 0</div>
        <p style="color:#e74c3c; font-weight:bold;">※ 자동 채점 결과가 부정확할 수 있습니다. 맞춘 문제는 O/X 버튼을 눌러 스스로 채점해주세요.</p>
        <table id="result-table">
            <thead>
                <tr>
                    <th width="5%">No.</th><th width="20%">내 입력</th><th width="25%">정답 (Eng / Kor)</th>
                    <th width="20%">Region & Source</th><th width="10%">시간</th><th width="15%">채점 (O/X)</th>

        </table>
        <div style="margin-top:30px; text-align: center; padding-bottom: 50px;">
            <button class="nav-action btn-nav" style="padding: 15px 40px; font-size: 18px;" onclick="location.reload()">처음 화면으로</button>

    <div id="image-modal" class="modal" onclick="closeImageModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeImageModal(event)">&times;</button>
            <img id="modal-image" src="" alt="Popup Image">
        </div>

    <script>
        // Seed RNG
        function createRNG(seed) {
            let t = seed += 0x6D2B79F5;
            return function() {
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function shuffleArray(array, rng) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(rng() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        let quizData = [], currentIndex = 0, timeElapsed = 0, limitTime = 30, questionStartTime = 0;
        let userAnswers = [], gradingResults = [], timeSpent = [];
        let hasSavedRecord = false, currentMode = 'study', examInterval = null, currentSeed = 0;
        let zoomScale = 1;

        window.onload = function() {
            setupZoomListener();
        };

        // 전체 풀에서 기출가중치로 추출하되, 한 영역이 균등 기준보다 1문제 넘게
        // 초과하지 않도록 제한합니다. 같은 구조물은 세트당 한 번만 허용합니다.
        function getItemWeight(item) {
            const w = Number(item.exam_weight);
            return Number.isFinite(w) && w > 0 ? w : 1;
        }

        function getUniqueQuestionKey(item) {
            return item.source || item.image_filename || item.quiz_id || item.answer_en;
        }

        function getStructureKey(item) {
            const label = String(item.answer_ko || item.answer_en || item.raw_label || getUniqueQuestionKey(item));
            return label.normalize('NFKC').toLowerCase()
                .replace(/\b(left|right|lt|rt)\b/g, '')
                .replace(/(왼쪽|오른쪽|좌측|우측)/g, '')
                .replace(/[^0-9a-z가-힣]+/g, '');
        }

        function getRegionKey(item) {
            if (!item) return 'Unknown';
            if (item.region_detail) return item.region_detail;

            // Fallback: old DB may have "Region: Back" or "Unit: Head and Neck / Region: Face"
            const regionText = String(item.region || item.source || 'Unknown');
            const m = regionText.match(/Region:\s*([^/]+)$/);
            if (m) return m[1].trim();

            // If source/image_title is like "Lateral Neck - 10", remove numbers and separators.
            return regionText
                .replace(/\d+/g, '')
                .replace(/[-_–—]+/g, ' ')
                .replace(/\s+/g, ' ')
                .replace(/^Region:\s*/i, '')
                .trim() || 'Unknown';
        }

        function getDisplayRegionText(item) {
            return `Region: ${getRegionKey(item)}`;
        }

        function buildImageCandidates(itemOrFilename) {
            let filename = "";
            let explicitPath = "";

            if (typeof itemOrFilename === "object" && itemOrFilename !== null) {
                filename = itemOrFilename.image_filename || "";
                explicitPath = itemOrFilename.image_path || "";
            } else {
                filename = itemOrFilename || "";
            }

            const candidates = [];
            if (explicitPath) candidates.push(String(explicitPath).replace(/\\/g, "/"));

            if (!filename) return candidates;

            const basePath = "Spotter_Questions_All/";
            const cleanName = String(filename).replace(/^[/\\]+/, '');
            const dotIndex = cleanName.lastIndexOf('.');
            const stem = dotIndex >= 0 ? cleanName.slice(0, dotIndex) : cleanName;

            const defaultCandidate = basePath + cleanName;
            if (!candidates.includes(defaultCandidate)) candidates.push(defaultCandidate);

            ['.jpg', '.jpeg', '.png', '.webp', '.JPG', '.JPEG', '.PNG', '.WEBP'].forEach(ext => {
                const candidate = basePath + stem + ext;
                if (!candidates.includes(candidate)) candidates.push(candidate);
            });
            return candidates;
        }

        function setQuestionImage(imgEl, itemOrFilename) {
            const candidates = buildImageCandidates(itemOrFilename);
            let tryIndex = 0;

            imgEl.onerror = function() {
                tryIndex += 1;
                if (tryIndex < candidates.length) {
                    imgEl.src = candidates[tryIndex];
                    return;
                }

                imgEl.style.display = "none";
                const box = imgEl.parentElement;
                let msg = document.getElementById('image-error-message');
                if (!msg) {
                    msg = document.createElement('div');
                    msg.id = 'image-error-message';
                    msg.style.color = '#ecf0f1';
                    msg.style.background = 'rgba(0,0,0,0.45)';
                    msg.style.padding = '16px 20px';
                    msg.style.borderRadius = '8px';
                    msg.style.fontWeight = 'bold';
                    msg.style.textAlign = 'center';
                    box.appendChild(msg);
                }
                msg.innerHTML = `이미지를 찾지 못했습니다.<br><span style="font-size:13px; font-weight:normal;">찾은 경로: ${candidates.join('<br>')}</span>`;
            };

            const oldMsg = document.getElementById('image-error-message');
            if (oldMsg) oldMsg.remove();

            if (candidates.length === 0) {
                imgEl.style.display = "none";
                return;
            }

            imgEl.style.display = "block";
            imgEl.src = candidates[0];
        }

        function weightedPick(candidates, rng) {
            const totalWeight = candidates.reduce((sum, item) => sum + getItemWeight(item), 0);
            let r = rng() * totalWeight;

            for (const item of candidates) {
                r -= getItemWeight(item);
                if (r <= 0) return item;
            }
            return candidates[candidates.length - 1];
        }

        function collapseToUniqueStructures(candidates, rng) {
            const groups = new Map();
            candidates.forEach(item => {
                const key = getStructureKey(item);
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(item);
            });
            return [...groups.values()].map(items => items[Math.floor(rng() * items.length)]);
        }

        function buildQuizSet(seedNum) {
            const rng = createRNG(seedNum * 1417);
            const selected_items = [];
            const used_question_keys = new Set();
            const used_structure_keys = new Set();
            const questionLimit = Math.min(30, QUIZ_DB.length);
            const regionKeys = new Set(QUIZ_DB.map(getRegionKey));
            const regionCounts = new Map();
            let regionCap = Math.max(1, Math.ceil(questionLimit / Math.max(regionKeys.size, 1)) + 1);
            let lastRegion = null;

            while (selected_items.length < questionLimit) {
                let candidates = QUIZ_DB.filter(item => {
                    const regionKey = getRegionKey(item);
                    return !used_question_keys.has(getUniqueQuestionKey(item)) &&
                        !used_structure_keys.has(getStructureKey(item)) &&
                        (regionCounts.get(regionKey) || 0) < regionCap;
                });
                if (candidates.length === 0) {
                    if (regionCap >= questionLimit) break;
                    regionCap += 1;
                    continue;
                }
                const alternateRegions = candidates.filter(item => getRegionKey(item) !== lastRegion);
                if (alternateRegions.length > 0) candidates = alternateRegions;
                candidates = collapseToUniqueStructures(candidates, rng);
                const pick = weightedPick(candidates, rng);
                const pickedRegion = getRegionKey(pick);
                selected_items.push(pick);
                used_question_keys.add(getUniqueQuestionKey(pick));
                used_structure_keys.add(getStructureKey(pick));
                regionCounts.set(pickedRegion, (regionCounts.get(pickedRegion) || 0) + 1);
                lastRegion = pickedRegion;
            }
            return selected_items;
        }
        // -------------------------------------------------------------------

        function playBuzzer() {
            if (!document.getElementById('buzzer-toggle').checked) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) { console.log("Audio API not supported"); }
        }

        function toggleRecords() {
            const list = document.getElementById('records-list');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
            let records = JSON.parse(localStorage.getItem('spotter_records') || '[]');
            if (records.length === 0) { list.innerHTML = "<div style='text-align:center;'>저장된 기록이 없습니다.</div>"; return; }
            list.innerHTML = records.map(r => `<div style="padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;"><span>${r.date} [${r.mode}/${r.session}]</span><strong style="color:#2ecc71;">${r.score} / ${r.total}점</strong></div>`).join('');
        }

        function saveRecordToStorage(score, total) {
            if (hasSavedRecord) return;
            let records = JSON.parse(localStorage.getItem('spotter_records') || '[]');
            records.unshift({date: new Date().toLocaleString(), session: `Seed: ${currentSeed}`, mode: currentMode === 'exam' ? '땡시' : '공부', score: score, total: total});
            localStorage.setItem('spotter_records', JSON.stringify(records));
            hasSavedRecord = true;
        }

        function startQuiz(mode) {
            if (typeof QUIZ_DB === 'undefined') {
                alert("quiz_db.js 파일을 로드하지 못했습니다."); return;
            }
            if (!Array.isArray(QUIZ_DB) || QUIZ_DB.length === 0) {
                alert("quiz_db.js에 문제가 0개입니다. spotter_quiz_integrated_fixed.py를 다시 실행해서 quiz_db.js를 재생성하세요.");
                return;
            }

            let seedInput = document.getElementById('seed-input').value;
            currentSeed = parseInt(seedInput);
            if (isNaN(currentSeed)) currentSeed = Math.floor(Math.random() * 100000);

            quizData = buildQuizSet(currentSeed);
            if (!quizData || quizData.length === 0) {
                alert("출제 가능한 문제가 0개입니다. quiz_db.js가 비어 있거나, DB 생성 단계에서 모든 문제가 제외되었습니다.");
                return;
            }
            userAnswers = new Array(quizData.length).fill("");
            gradingResults = new Array(quizData.length).fill(false);
            timeSpent = new Array(quizData.length).fill(0);

            currentMode = mode;
            if (currentMode === 'exam') {
                limitTime = parseInt(document.getElementById('timer-input').value) || 30;
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('study-answer-box').classList.add('hidden');
            } else { 
                document.getElementById('timer-display').style.display = 'none'; 
                document.getElementById('study-answer-box').classList.remove('hidden');
            }
            
            document.getElementById('start-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'flex';
            loadQuestion(0);
        }

        function loadQuestion(index) {
            const data = quizData[index];
            document.getElementById('progress').innerText = `Question ${index + 1} / ${quizData.length}`;
            
            const imgEl = document.getElementById('question-image');
            imgEl.src = "Spotter_Questions_All/" + data.image_filename;
            imgEl.style.display = "block";
            
            document.getElementById('region-box').innerText = data.region;
            toggleRegion(); 
            document.getElementById('user-input').value = userAnswers[index];
            document.getElementById('answer-hint').style.display = 'none';

            if (index === quizData.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('hidden');
            }
            questionStartTime = Date.now();
            resetTimer();
            setTimeout(() => document.getElementById('user-input').focus(), 50);
        }

        function showAnswerHint() {
            const data = quizData[currentIndex];
            const hintBox = document.getElementById('answer-hint');
            hintBox.innerHTML = `EN: ${data.answer_en || '없음'}<br>KO: ${data.answer_ko || '없음'}`;
            hintBox.style.display = 'block';
        }

        function resetTimer() {
            clearInterval(examInterval); timeElapsed = 0;
            if (currentMode === 'exam') {
                updateTimerUI();
                examInterval = setInterval(() => {
                    timeElapsed++; updateTimerUI();
                    if (timeElapsed >= limitTime) {
                        clearInterval(examInterval); playBuzzer(); saveAnswer();
                        if (currentIndex < quizData.length - 1) { currentIndex++; loadQuestion(currentIndex); } 
                        else { showResults(); }
                    }
                }, 1000);
            }
        }

        function updateTimerUI() {
            const timerEl = document.getElementById('timer-display');
            timerEl.innerText = `⏱ ${timeElapsed} / ${limitTime} 초`;
            if (limitTime - timeElapsed <= 5) timerEl.classList.add('timer-warning');
            else timerEl.classList.remove('timer-warning');
        }

        function toggleRegion() {
            const isChecked = document.getElementById('region-toggle').checked;
            document.getElementById('region-box').style.display = isChecked ? "block" : "none";
            document.getElementById('region-divider').style.display = isChecked ? "block" : "none";
        }

        function saveAnswer() {
            userAnswers[currentIndex] = document.getElementById('user-input').value.trim();
            if (questionStartTime > 0) { timeSpent[currentIndex] += (Date.now() - questionStartTime) / 1000; questionStartTime = 0; }
        }

        function handleKeyPress(e) { if (e.key === 'Enter') { if (currentIndex < quizData.length - 1) nextQuestion(); else showResults(); } }

        document.addEventListener('keydown', function(e) {
            const inputEl = document.getElementById('user-input');
            if (document.getElementById('image-modal').style.display === "flex") { if (e.key === 'Escape') closeImageModal(e); return; }
            if (document.getElementById('quiz-container').style.display !== 'flex') return;
            if (document.activeElement === inputEl) return;
            if (e.key === 'ArrowRight') { if (currentIndex < quizData.length - 1) nextQuestion(); e.preventDefault(); } 
            else if (e.key === 'ArrowLeft') { if (currentIndex > 0) prevQuestion(); e.preventDefault(); } 
            else if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) { inputEl.focus(); }
        });

        function nextQuestion() { saveAnswer(); if (currentIndex < quizData.length - 1) { currentIndex++; loadQuestion(currentIndex); } }
        function prevQuestion() { saveAnswer(); if (currentIndex > 0) { currentIndex--; loadQuestion(currentIndex); } }

        function normalizeAbbr(text) {
            if (!text) return ""; let s = text.toLowerCase();
            s = s.replace(/\brt\.?\b/g, 'right'); s = s.replace(/\blt\.?\b/g, 'left');
            s = s.replace(/\bant\.?\b/g, 'anterior'); s = s.replace(/\bpost\.?\b/g, 'posterior');
            s = s.replace(/\bsup\.?\b/g, 'superior'); s = s.replace(/\binf\.?\b/g, 'inferior');
            s = s.replace(/\blat\.?\b/g, 'lateral'); s = s.replace(/\bmed\.?\b/g, 'medial');
            s = s.replace(/\bext\.?\b/g, 'external'); s = s.replace(/\bint\.?\b/g, 'internal');
            s = s.replace(/\bsupf\.?\b/g, 'superficial'); s = s.replace(/\bm\.?\b/g, 'muscle');
            s = s.replace(/\ba\.?\b/g, 'artery'); s = s.replace(/\bv\.?\b/g, 'vein');
            s = s.replace(/\bn\.?\b/g, 'nerve'); s = s.replace(/\blig\.?\b/g, 'ligament');
            s = s.replace(/\bbr\.?\b/g, 'branch'); s = s.replace(/\bmusculus\b/g, 'muscle');
            s = s.replace(/\barteria\b/g, 'artery'); s = s.replace(/\bvena\b/g, 'vein');
            s = s.replace(/\bnervus\b/g, 'nerve'); s = s.replace(/\bligamentum\b/g, 'ligament');
            return s.replace(/[^a-z0-9가-힣]/g, '');
        }

        function autoGrade(userInput, correctEn, correctKo) {
            if (!userInput) return false;
            const inputNorm = normalizeAbbr(userInput), enNorm = normalizeAbbr(correctEn), koNorm = correctKo.replace(/[^a-z0-9가-힣]/gi, ''); 
            if (enNorm && enNorm.includes(inputNorm) && inputNorm.length > 2) return true;
            if (koNorm && koNorm.includes(inputNorm) && inputNorm.length > 1) return true;
            if (inputNorm === enNorm || inputNorm === koNorm) return true;
            return false;
        }

        function showResults() {
            saveAnswer(); clearInterval(examInterval); 
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            const tbody = document.getElementById('result-body'); tbody.innerHTML = "";
            quizData.forEach((data, i) => {
                const myAns = userAnswers[i]; gradingResults[i] = autoGrade(myAns, data.answer_en, data.answer_ko);
                const btnClass = gradingResults[i] ? "correct-btn is-correct" : "correct-btn", btnText = gradingResults[i] ? "O (정답)" : "X (오답)", timeStr = timeSpent[i].toFixed(1) + "초";
                const tr = document.createElement('tr');
                tr.innerHTML = `<td style="text-align:center;">${i + 1}</td><td style="font-weight:bold; color:#2980b9; font-size:16px;">${myAns || '<span style="color:#bdc3c7;">(미입력)</span>'}</td><td><strong style="font-size:16px;">${data.answer_en}</strong><br><span style="color:#7f8c8d;">${data.answer_ko}</span></td><td style="font-size:13px; color:#555;">${getDisplayRegionText(data)}<br><span style="color:#95a5a6;">Src: ${data.source}</span><br><span style="color:#95a5a6;">출제횟수: ${data.past_count ?? 0}회</span><br><span style="color:#95a5a6;">최근년도: ${data.recent_year || '없음'}</span><br><button class="btn-img" onclick="showResultImageModal(${i})">🖼️ 사진 보기</button></td><td style="text-align:center; font-weight:bold; color:#7f8c8d;">${timeStr}</td><td style="text-align:center; vertical-align:middle;"><button class="${btnClass}" id="grade-btn-${i}" onclick="toggleGrade(${i})">${btnText}</button></td>`;
                tbody.appendChild(tr);
            });
            updateScoreDisplay();
        }

        function toggleGrade(index) {
            gradingResults[index] = !gradingResults[index];
            const btn = document.getElementById(`grade-btn-${index}`);
            if (gradingResults[index]) { btn.className = "correct-btn is-correct"; btn.innerText = "O (정답)"; } 
            else { btn.className = "correct-btn"; btn.innerText = "X (오답)"; }
            updateScoreDisplay();
        }

        function updateScoreDisplay() {
            const correctCount = gradingResults.filter(Boolean).length;
            document.getElementById('total-score').innerText = `최종 점수: ${correctCount} / ${quizData.length}`;
            saveRecordToStorage(correctCount, quizData.length);
        }

        function setupZoomListener() {
            const modalImg = document.getElementById('modal-image');
            modalImg.addEventListener('wheel', (e) => {
                e.preventDefault();
                zoomScale += e.deltaY * -0.002;
                zoomScale = Math.min(Math.max(0.5, zoomScale), 5); 
                modalImg.style.transform = `scale(${zoomScale})`;
            });
        }
        
        function openMainImageModal() {
            const src = document.getElementById('question-image').src;
            if(!src || src.includes('undefined')) return;
            openModalWithImage(src);
        }

        function showResultImageModal(index) {
            const data = quizData[index];
            if(data.image_filename) {
                openModalWithImage(buildImageCandidates(data)[0]);
            } else { alert("이미지가 없는 문제입니다."); }
        }

        function openModalWithImage(src) {
            const modalImg = document.getElementById('modal-image');
            modalImg.src = src; 
            modalImg.style.display = "block";
            zoomScale = 1; 
            modalImg.style.transform = `scale(1)`;
            document.getElementById('image-modal').style.display = "flex"; 
        }

        function closeImageModal(e) { 
            if(e) e.stopPropagation();
            document.getElementById('image-modal').style.display = "none"; 
        }
    </script>
</body>
</html>
