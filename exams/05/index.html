<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neuro Spotter Mock Exam</title>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:#eef2f6;color:#1f2937;font-family:"Malgun Gothic",Arial,sans-serif;user-select:none}button,input{font:inherit}.hidden{display:none!important}
#start{height:100vh;display:flex;align-items:center;justify-content:center;background:#243447;color:white;padding:28px}.panel{width:min(720px,100%);display:grid;gap:18px}h1{margin:0;font-size:40px}.muted{color:#cbd5e1;line-height:1.55}.settings{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:8px;color:#dbeafe}.field input{padding:12px;border-radius:8px;border:1px solid #475569}.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mode{min-height:78px;border:0;border-radius:8px;color:white;font-weight:800;cursor:pointer;text-align:left;padding:16px}.mode span{display:block;font-weight:400;color:rgba(255,255,255,.82);margin-top:5px}.exam{background:#d94841}.study{background:#2f80ed}
#quiz{display:none;height:100vh}.image-pane{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;padding:20px;background:#111827}.stage{position:relative;display:inline-block;max-width:100%;max-height:100%}#qimg{display:block;max-width:calc(100vw - 430px);max-height:calc(100vh - 40px);object-fit:contain;background:white;border-radius:8px;box-shadow:0 16px 40px rgba(0,0,0,.35);cursor:zoom-in}.pin{position:absolute;left:var(--x);top:var(--y);width:28px;height:46px;transform:translate(calc(-50% + 2px),-100%);pointer-events:none}.pin:before{content:"";position:absolute;left:50%;bottom:0;width:4px;height:31px;transform:translateX(-50%);border-radius:3px;background:linear-gradient(90deg,#5a5a5a 0%,#d2d2d2 58%,#777 100%);box-shadow:0 4px 10px rgba(0,0,0,.35)}.pin:after{content:"";position:absolute;left:50%;top:0;width:18px;height:18px;transform:translateX(-50%);border-radius:50%;border:2px solid #6e0000;background:radial-gradient(circle at 35% 35%,rgba(255,220,220,.8) 0 18%,rgba(255,220,220,0) 19%),#b41414;box-shadow:0 5px 12px rgba(0,0,0,.38)}
.side{width:410px;display:flex;flex-direction:column;gap:15px;padding:22px;overflow:auto;background:white;border-left:1px solid #d8dee8}.top{display:flex;justify-content:space-between;gap:12px;align-items:start}#progress{font-size:20px;font-weight:800}#timer{padding:8px 10px;border-radius:8px;background:#e8f1ff;color:#1d4ed8;font-weight:800;white-space:nowrap}.warn{background:#fee2e2!important;color:#b91c1c!important}.meta{padding:12px;border:1px solid #e5e7eb;border-radius:8px;background:#f8fafc;color:#475569;line-height:1.55;font-size:14px}#answer{width:100%;padding:14px 15px;border:2px solid #cbd5e1;border-radius:8px;font-size:18px}.hint{display:none;padding:12px;border-radius:8px;background:#fff7ed;color:#9a3412;line-height:1.5;font-weight:700}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}.actions button,.topbtn{min-height:46px;padding:10px;border:0;border-radius:8px;color:white;font-weight:800;cursor:pointer}.secondary{background:#64748b}.primary{background:#2563eb}.success{background:#16a34a}.danger{background:#dc2626}
#results{display:none;height:100vh;overflow:auto;padding:24px;background:#f8fafc}.result-head{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}#score{margin:0;font-size:28px}table{width:100%;border-collapse:collapse;background:white;border:1px solid #e5e7eb}th,td{padding:12px;border-bottom:1px solid #e5e7eb;vertical-align:top;text-align:left}th{background:#e8eef6;color:#334155}.grade,.imgbtn{padding:8px 10px;border:0;border-radius:8px;color:white;background:#ef4444;white-space:nowrap;cursor:pointer}.grade.ok{background:#16a34a}.imgbtn{background:#475569;margin-top:8px}
#modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.86);z-index:20}.modal-stage{position:relative;display:inline-block;max-width:96vw;max-height:92vh;transform-origin:center center;transition:transform .12s ease;cursor:grab;touch-action:none}.modal-stage.panning{cursor:grabbing;transition:none}#modal-img{display:block;max-width:96vw;max-height:92vh;object-fit:contain;background:white;border-radius:8px}.close{position:fixed;top:18px;right:18px;width:42px;height:42px;border-radius:50%;border:0;background:white;color:#111827;font-size:28px;line-height:1;z-index:21;cursor:pointer}
@media(max-width:900px){body{overflow:auto;height:auto}#quiz{height:auto;min-height:100vh;flex-direction:column}.image-pane{min-height:52vh}#qimg{max-width:calc(100vw - 28px);max-height:50vh}.side{width:100%;border-left:0;border-top:1px solid #d8dee8}.settings,.mode-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<main id="start"><section class="panel"><div><h1>Neuro Spotter Mock Exam</h1><p class="muted" id="exam-title"></p></div><div class="settings"><label class="field">땡시 제한 시간<input id="limit" type="number" min="5" max="300" value="30"></label><label class="field">종료 알림음<label style="display:flex;gap:8px;align-items:center;color:#dbeafe"><input type="checkbox" id="buzzer" checked> 사용</label></label></div><div class="mode-row"><button class="mode exam" onclick="startQuiz('exam')">땡시 모드<span>시간이 지나면 자동으로 넘어갑니다.</span></button><button class="mode study" onclick="startQuiz('study')">공부 모드<span>정답 확인과 자유 이동을 사용합니다.</span></button></div></section></main>
<section id="quiz"><div class="image-pane"><div class="stage"><img id="qimg" src="" alt="Question image" onclick="openMainModal()"><div class="pin" id="qpin"></div></div></div><aside class="side"><div class="top"><div id="progress"></div><div id="timer"></div></div><label style="display:flex;gap:8px;align-items:center;color:#475569;font-size:14px;cursor:pointer"><input type="checkbox" id="info-toggle" checked onchange="toggleInfo()">정보 보기</label><div class="meta" id="meta"></div><label for="answer" style="color:#64748b;font-weight:800">정답 입력</label><input id="answer" type="text" autocomplete="off" onkeypress="handleKey(event)"><div class="hint" id="hint"></div><div class="actions"><button class="secondary" onclick="prevQ()">이전</button><button class="secondary" onclick="showHint()">정답 보기</button><button class="primary" id="next" onclick="nextQ()">다음</button><button class="success hidden" id="finish" onclick="showResults()">결과 보기</button><button class="danger" onclick="location.reload()">처음으로</button></div></aside></section>
<section id="results"><div class="result-head"><h1 id="score">최종 점수: 0 / 0</h1><button class="topbtn primary" onclick="location.reload()">새 퀴즈</button></div><table><thead><tr><th>No.</th><th>내 답</th><th>정답</th><th>정보</th><th>시간</th><th>채점</th></tr></thead><tbody id="tbody"></tbody></table></section>
<div id="modal" onclick="closeModal(event)"><button class="close" onclick="closeModal(event)">&times;</button><div class="modal-stage" onclick="event.stopPropagation()"><img id="modal-img" src="" alt="Expanded image"><div class="pin" id="mpin"></div></div></div>

document.addEventListener("keydown",e=>{if(document.getElementById("modal").style.display==="flex"){if(e.key==="Escape")closeModal(e);return}if(document.getElementById("quiz").style.display!=="flex")return;if(document.activeElement===document.getElementById("answer"))return;if(e.key==="ArrowRight"){if(idx<quizData.length-1)nextQ();e.preventDefault()}else if(e.key==="ArrowLeft"){if(idx>0)prevQ();e.preventDefault()}else if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1)document.getElementById("answer").focus()});
function norm(t){if(!t)return"";let s=String(t).toLowerCase();[[/\brt\.?\b/g,"right"],[/\blt\.?\b/g,"left"],[/\bant\.?\b/g,"anterior"],[/\bpost\.?\b/g,"posterior"],[/\bsup\.?\b/g,"superior"],[/\binf\.?\b/g,"inferior"],[/\blat\.?\b/g,"lateral"],[/\bmed\.?\b/g,"medial"],[/\bext\.?\b/g,"external"],[/\bint\.?\b/g,"internal"],[/\bsupf\.?\b/g,"superficial"],[/\bbr\.?\b/g,"branch"],[/\baa\.?\b/g,"arteries"],[/\ba\.?\b/g,"artery"],[/\bv\.?\b/g,"vein"],[/\bn\.?\b/g,"nerve"]].forEach(([a,b])=>s=s.replace(a,b));return s.replace(/[^a-z0-9가-힣]/g,"")}function autoGrade(input,d){if(!input)return false;const a=norm(input);return[d.answer_en,d.answer_ko,d.raw_label].filter(Boolean).map(norm).some(c=>c===a||(a.length>2&&c.includes(a)))}
function showResults(){saveAnswer();saveElapsed();clearInterval(timer);document.getElementById("quiz").style.display="none";document.getElementById("results").style.display="block";const tbody=document.getElementById("tbody");tbody.innerHTML="";quizData.forEach((d,i)=>{grades[i]=autoGrade(answers[i],d);const tr=document.createElement("tr");tr.innerHTML=`<td>${i+1}</td><td><strong>${esc(answers[i]||"(미입력)")}</strong></td><td><strong>${esc(d.answer_en||"")}</strong><br><span>${esc(d.answer_ko||"")}</span></td><td>${meta(d)}<br><button class="imgbtn" onclick="showResultImage(${i})">사진 보기</button></td><td>${(times[i]||0).toFixed(1)}초</td><td><button id="g${i}" class="grade ${grades[i]?"ok":""}" onclick="toggleGrade(${i})">${grades[i]?"O":"X"}</button></td>`;tbody.appendChild(tr)});updateScore()}function toggleGrade(i){grades[i]=!grades[i];const b=document.getElementById(`g${i}`);b.classList.toggle("ok",grades[i]);b.innerText=grades[i]?"O":"X";updateScore()}function updateScore(){const n=grades.filter(Boolean).length;document.getElementById("score").innerText=`최종 점수: ${n} / ${quizData.length}`}
function updateModal(){document.querySelector(".modal-stage").style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`}function openMainModal(){openModal(quizData[idx])}function showResultImage(i){openModal(quizData[i])}function openModal(d){document.getElementById("modal-img").src=d.image_filename;pin(document.getElementById("mpin"),d);zoom=1;panX=0;panY=0;updateModal();document.getElementById("modal").style.display="flex"}function closeModal(e){if(e)e.stopPropagation();document.getElementById("modal").style.display="none"}const ms=document.querySelector(".modal-stage"),mi=document.getElementById("modal-img");mi.addEventListener("wheel",e=>{e.preventDefault();zoom+=e.deltaY*-.002;zoom=Math.min(Math.max(.5,zoom),5);updateModal()});ms.addEventListener("pointerdown",e=>{e.preventDefault();panning=true;startX=e.clientX;startY=e.clientY;origX=panX;origY=panY;ms.classList.add("panning");ms.setPointerCapture(e.pointerId)});ms.addEventListener("pointermove",e=>{if(!panning)return;panX=origX+e.clientX-startX;panY=origY+e.clientY-startY;updateModal()});function endPan(e){panning=false;ms.classList.remove("panning");if(ms.hasPointerCapture(e.pointerId))ms.releasePointerCapture(e.pointerId)}ms.addEventListener("pointerup",endPan);ms.addEventListener("pointercancel",endPan);
</script>
