<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotter — Bell Exam</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: rgba(24, 35, 54, .82);
      --line: rgba(148, 163, 184, .18);
      --muted: #8f9db0;
      --blue: #6285f3;
      --red: #d46255;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% 2%, rgba(98, 133, 243, .13), transparent 30rem),
        radial-gradient(circle at 88% 92%, rgba(212, 98, 85, .08), transparent 32rem),
        var(--bg);
      color: #f8fafc;
      font-family: "Malgun Gothic", "Inter", Arial, sans-serif;
    }
    a { color: inherit; }
    .shell {
      width: min(1120px, calc(100% - 48px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 0 52px;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .16em;
    }
    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: #f8fafc;
      color: var(--bg);
      letter-spacing: 0;
    }
    .top-meta { color: var(--muted); font-size: 12px; letter-spacing: .12em; }
    .hero { padding: clamp(58px, 9vw, 110px) 0 46px; }
    .hero-kicker {
      margin: 0 0 14px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(48px, 8vw, 88px);
      line-height: .98;
      letter-spacing: -.055em;
    }
    .hero-line {
      width: 56px;
      height: 3px;
      margin-top: 30px;
      border-radius: 999px;
      background: var(--blue);
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      min-height: 176px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      text-decoration: none;
      backdrop-filter: blur(14px);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }
    .card:hover, .card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(148, 163, 184, .48);
      background: rgba(31, 44, 66, .94);
      outline: 0;
    }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .number {
      color: var(--muted);
      font: 700 12px/1 "Consolas", monospace;
      letter-spacing: .14em;
    }
    .arrow {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: #dbe5f3;
      font-size: 18px;
    }
    .card strong {
      display: block;
      font-size: clamp(25px, 3.2vw, 36px);
      line-height: 1.08;
      letter-spacing: -.035em;
    }
    .card small { display: block; margin-top: 9px; color: var(--muted); font-size: 13px; }
    .card:nth-child(1) { box-shadow: inset 3px 0 0 var(--blue); }
    .card:nth-child(2) { box-shadow: inset 3px 0 0 #45b6c9; }
    .card:nth-child(3) { box-shadow: inset 3px 0 0 #9a7ee8; }
    .card:nth-child(4) { box-shadow: inset 3px 0 0 var(--red); }
    @media (max-width: 720px) {
      .shell { width: min(100% - 30px, 1120px); padding-top: 20px; }
      .top-meta { display: none; }
      .hero { padding: 54px 0 36px; }
      h1 { max-width: 320px; font-size: clamp(40px, 11vw, 48px); }
      .section-head span:last-child { display: none; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 150px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">S</span><span>SPOTTER</span></div>
      <div class="top-meta">BELL EXAM</div>
    </header>

    <section class="hero">
      <p class="hero-kicker">Anatomy practice</p>
      <h1>Choose your section.</h1>
      <div class="hero-line"></div>
    </section>

    <div class="section-head"><span>Sections</span><span>01—04</span></div>
    <section class="grid" aria-label="Bell Exam sections">
      <a class="card" href="exam1/">
        <div class="card-top"><span class="number">01</span><span class="arrow">↗</span></div>
        <div><strong>Extremities</strong><small>상지 · 하지</small></div>
      </a>
      <a class="card" href="trunk/">
        <div class="card-top"><span class="number">02</span><span class="arrow">↗</span></div>
        <div><strong>Trunk</strong><small>몸통</small></div>
      </a>
      <a class="card" href="head-neck/">
        <div class="card-top"><span class="number">03</span><span class="arrow">↗</span></div>
        <div><strong>Head &amp; Neck</strong><small>머리 · 목</small></div>
      </a>
      <a class="card" href="neuro/">
        <div class="card-top"><span class="number">04</span><span class="arrow">↗</span></div>
        <div><strong>Neuroanatomy</strong><small>신경해부학</small></div>
      </a>
    </section>
  </main>
</body>
</html>
